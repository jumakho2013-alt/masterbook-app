# Конфигурация GitHub Pages (Jekyll).
# После пуша в main этот каталог автоматически отдаётся по адресу
# https://<username>.github.io/<repo>/ — нужно в Settings репозитория
# → Pages → Source: "Deploy from a branch" → Branch: main /docs.

title: MasterBook
description: CRM для частных мастеров — записи, клиенты, финансы в одном приложении
theme: jekyll-theme-minimal
show_downloads: false
# Чистые URL без .html суффикса.
permalink: pretty

# Не строим файлы из .git, node_modules, и т.д.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .sass-cache
  - .jekyll-cache
  - node_modules
